<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparing Fractions Visually</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="chocolate-component/chocolate-bar.css" />
  </head>
  <body>
    <div class="responsive-container">
      <div class="responsive-wrapper" id="app"></div>
    </div>

    <script src="data.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/mini-react.js"></script>
    <script src="chocolate-component/chocolate-bar.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>

    <script>
      window.addEventListener('load', function () {
        if (!window.appData) {
          console.error('appData not available, retrying in 200ms');
          setTimeout(function () {
            if (window.appData && typeof initializeApp === 'function') {
              initializeApp();
            }
          }, 200);
          return;
        }

        if (typeof initializeResponsiveScaling === 'function') {
          initializeResponsiveScaling();
        }

        if (typeof initializeApp === 'function') {
          initializeApp();
        }
      });
    </script>
  </body>
</html>
